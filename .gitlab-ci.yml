stages:
  - init
  - idma

init:
  stage: init
  before_script:
    - uv venv ${HOME}/ci-venv
    - uv pip install --python ${HOME}/ci-venv/bin/python -r requirements.txt --cache-dir ${CACHEDIR}/uv
    - export PATH=${HOME}/ci-venv/bin:${PATH}
  script:
    - make idma_nonfree_init
    - make idma_nonfree_ci
  artifacts:
      paths:
        - nonfree/ci/ci.yml

idma:
  stage: idma
  needs: [ init ]
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^__deploy__/
      when: never
    - when: always
  trigger:
    include:
      - artifact: nonfree/ci/ci.yml
        job: init
    strategy: depend
